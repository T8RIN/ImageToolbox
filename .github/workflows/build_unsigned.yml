name: Build Unsigned Release APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'الفرع المراد بناؤه'
        required: true
        default: 'a11y-clean'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          java-package: 'jdk'
          cache: gradle

      - name: Build FOSS Release APK (unsigned)
        run: bash ./gradlew assembleFossRelease

      - name: List all output files
        run: |
          echo "=== Full directory tree ==="
          find app/build/outputs/ -type f -name "*.apk" 2>/dev/null || echo "No APK files found in outputs/"
          find app/build/outputs/ -type d 2>/dev/null | head -30
          echo "=== Checking split dirs ==="
          find app/build/ -type d -name "*split*" -o -type d -name "*abi*" 2>/dev/null | head -20
          echo "=== Any APK in build/ ==="
          find app/build/ -name "*.apk" 2>/dev/null | head -20

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ImageToolbox-unsigned-arm64-v8a
          path: |
            app/build/outputs/apk/foss/release/*arm64*v8a*.apk
            app/build/outputs/apk/**/*arm64*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload all APKs (fallback)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ImageToolbox-all-apks
          path: app/build/outputs/apk/foss/release/*.apk
          retention-days: 3

      - name: Clean up
        run: rm -rf app/build/outputs/apk/foss
